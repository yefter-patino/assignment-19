AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Assignment 19 - SECURITY nested stack (Yefter).
  Creates a security group and a network ACL (NACL) for the public subnets.
  The VPC ID comes IN from the network stack (passed by the parent stack).

Parameters:
  EnvironmentName:
    Type: String
    AllowedValues:
      - dev
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID. Passed in from the network stack outputs.

  VpcCidr:
    Type: String
    Description: The VPC CIDR block. Used so SSH is only allowed from inside the VPC.

Resources:
  # Security group: HTTP open to the world, SSH only from inside the VPC.
  # (We intentionally do NOT open SSH to 0.0.0.0/0 - that is a common finding.)
  YefterInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from anywhere and SSH from inside the VPC only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref VpcCidr
          Description: SSH from inside the VPC only
      Tags:
        - Key: Name
          Value: !Sub yefter-${EnvironmentName}-sg
        - Key: Owner
          Value: yefter

  # Network ACL: a second layer of network control on top of the security group.
  YefterPublicNacl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub yefter-${EnvironmentName}-nacl
        - Key: Owner
          Value: yefter

  # Inbound: allow HTTP (port 80).
  YefterNaclInboundHttp:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref YefterPublicNacl
      RuleNumber: 100
      Protocol: 6          # 6 = TCP
      RuleAction: allow
      Egress: false        # false = inbound
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  # Inbound: allow return traffic on ephemeral ports (needed for responses).
  YefterNaclInboundEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref YefterPublicNacl
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  # Outbound: allow all traffic out.
  YefterNaclOutboundAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref YefterPublicNacl
      RuleNumber: 100
      Protocol: -1         # -1 = all protocols
      RuleAction: allow
      Egress: true         # true = outbound
      CidrBlock: 0.0.0.0/0

Outputs:
  SecurityGroupId:
    Description: The ID of the security group (passed to the compute stack).
    Value: !Ref YefterInstanceSecurityGroup

  NaclId:
    Description: The ID of the network ACL.
    Value: !Ref YefterPublicNacl
